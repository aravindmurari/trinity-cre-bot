<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trinity CRE Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="chat-container">

    <div id="chat-header">
      <img id="header-logo" src="logo-tcre-white.png" alt="Trinity CRE">
      <div id="header-info">
        <div id="bot-tagline">Commercial Real Estate — Greater Atlanta <span id="online-badge">● Live</span></div>
      </div>
    </div>

    <div id="chat-messages">
      <div class="message-row bot-row">
        <div class="msg-avatar">T</div>
        <div class="message bot-message">
          Hi, I'm the Trinity CRE assistant. Trinity CRE helps businesses and investors with commercial real estate across Greater Atlanta — industrial space, office space, and investment sales.<br><br>
          What brings you here today?
        </div>
      </div>
    </div>

    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Ask about commercial real estate in Atlanta..." autocomplete="off" autofocus rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const API_URL = 'https://web-production-415a0.up.railway.app';
    const SESSION_ID = crypto.randomUUID();

    const messagesEl = document.getElementById('chat-messages');
    const inputEl    = document.getElementById('chat-input');
    const sendBtn    = document.getElementById('send-btn');

    let history = [];

    marked.setOptions({ breaks: true });

    function renderMarkdown(text) {
      // Convert bare contact URLs to markdown links before parsing
      text = text.replace(
        /(?<!\()(https:\/\/aravindmurari\.github\.io\/trinity-cre\/contact[^\s)]*)/g,
        '[Schedule a Free Consultation]($1)'
      );
      let html = marked.parse(text);
      html = html.replace(
        /<a href="(https:\/\/aravindmurari\.github\.io\/trinity-cre\/contact[^"]*)"[^>]*>[^<]*<\/a>/g,
        '<a href="$1" target="_blank" rel="noopener" class="contact-btn">&#128197; Schedule a Free Consultation</a>'
      );
      html = html.replace(/<a href="(?!https:\/\/aravindmurari\.github\.io\/trinity-cre\/contact)/g, '<a target="_blank" rel="noopener" href="');
      return html;
    }

    function appendMessage(text, role) {
      const row = document.createElement('div');
      row.className = `message-row ${role}-row`;

      if (role === 'bot') {
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = 'T';
        row.appendChild(avatar);
      }

      const bubble = document.createElement('div');
      bubble.className = `message ${role}-message`;
      bubble.innerHTML = role === 'bot' ? renderMarkdown(text) : '';
      if (role === 'user') bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'message-row bot-row';
      row.id = 'typing-row';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'T';

      const dots = document.createElement('div');
      dots.className = 'typing-indicator';
      dots.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      inputEl.disabled = true;
      sendBtn.disabled = true;

      appendMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch(`${API_URL}/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(-10), session_id: SESSION_ID }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        hideTyping();
        const botBubble = appendMessage('', 'bot');
        let sseBuffer = '';
        let fullText  = '';

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          sseBuffer += decoder.decode(value, { stream: true });
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            try {
              const { token } = JSON.parse(payload);
              fullText += token;
              botBubble.innerHTML = renderMarkdown(fullText);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } catch (_) {}
          }
        }

        history.push({ role: 'user',      content: text });
        history.push({ role: 'assistant', content: fullText });

      } catch (err) {
        hideTyping();
        appendMessage('Sorry, I ran into an issue. Please try again in a moment.', 'bot');
        console.error(err);
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
